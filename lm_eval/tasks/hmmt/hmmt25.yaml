task: hmmt25
dataset_path: MathArena/hmmt_feb_2025
dataset_name: default
output_type: generate_until
training_split: null
test_split: train
num_fewshot: 0
doc_to_text: "{{problem}}\nPlease reason step by step, and put your final answer within \\boxed{}."
doc_to_target: "{{answer}}"
process_results: !function utils.process_results
generation_kwargs:
  until:
    - "Problem:"
    - "</s>"
    - "<|im_end|>"
    - "<|eot_id|>"
    - "<|endoftext|>"
    - "<|return|>"
  do_sample: true
  temperature: 0.6
  max_gen_toks: 32768
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
repeats: 64
metadata:
  version: 1.0
